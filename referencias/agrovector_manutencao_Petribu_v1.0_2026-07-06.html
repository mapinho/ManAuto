<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroVector · Usina Petribú · Planejamento de Manutenção</title>
<style>
/* ── VECTOR CONSULTING · OFFICIAL PALETTE ────────────────────────────
   Primary Navy  : #1F3060
   Secondary Gray: #B2B5B7
   Dark BG       : #060d1a  Cards: #0d1530  Border: #1F3060
   Semantic: green #27c27a · amber #f59e0b · red #ef4444 · blue #38bdf8
──────────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#060d1a;color:#d4dff0;font-family:'Segoe UI',Arial,sans-serif;font-size:13px;min-height:100vh;}
#hdr{background:#1F3060;border-bottom:2px solid #162545;padding:0 24px;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.logo-img{height:44px;width:auto;display:block;object-fit:contain;}
.fase-badge{font-size:11px;color:#B2B5B7;background:#162545;border:1px solid #2a3f7a;border-radius:20px;padding:4px 14px;}
.tabs{display:flex;margin-top:0;padding-bottom:0;flex-wrap:wrap;background:#1F3060;border-top:1px solid #2a3f7a;}
.tab{background:none;border:none;color:#8090b8;padding:9px 16px;cursor:pointer;font-size:12px;font-family:inherit;border-bottom:2px solid transparent;transition:color .15s;}
.tab:hover{color:#B2B5B7;}
.tab.on{color:#ffffff;font-weight:700;border-bottom-color:#B2B5B7;}
.tab-sep{border-left:1px solid #2a3f7a;margin:6px 4px;}
.tab-phase{padding:9px 8px;font-size:10px;color:#3a4f7a;border-bottom:2px solid transparent;font-weight:700;cursor:default;}
#main{padding:22px 24px;max-width:1380px;margin:0 auto;}
.stitle{color:#B2B5B7;font-size:15px;font-weight:700;margin-bottom:3px;}
.sdesc{color:#3a5070;font-size:11px;margin-bottom:16px;}
.block{margin-bottom:26px;}
.blk-t{color:#B2B5B7;font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid #1F3060;display:flex;align-items:center;justify-content:space-between;}
.tbl-wrap{overflow-x:auto;border:1px solid #1F3060;border-radius:8px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:8px 10px;text-align:left;color:#5070a0;font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;background:#08111f;border-bottom:1px solid #1F3060;white-space:nowrap;}
th.of-hdr{background:#1F3060;color:#B2B5B7;text-align:center;}
th.r{text-align:right;}
td{padding:7px 10px;border-bottom:1px solid #0a1225;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#0d153055;}
.tr-c td{background:#060d1a!important;}
.tr-c .cv{color:#27c27a;font-family:monospace;font-weight:700;}
.tr-s td{background:#08111f!important;color:#1F3060;font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:5px 10px;}
.lbl{color:#7a90b0;min-width:200px;}
.um{color:#3a5070;font-size:10px;white-space:nowrap;}
td input[type=number],td input[type=text]{background:#0d1530;border:1px solid #1F3060;color:#d4dff0;border-radius:4px;padding:3px 7px;font-size:12px;font-family:monospace;outline:none;width:100%;min-width:55px;}
td input:focus{border-color:#B2B5B7;}
td select{background:#0d1530;border:1px solid #1F3060;color:#d4dff0;border-radius:4px;padding:3px 7px;font-size:12px;cursor:pointer;outline:none;width:100%;}
/* semantic color classes */
.cv{color:#27c27a;font-family:monospace;font-weight:600;}
.co{color:#B2B5B7;font-family:monospace;font-weight:600;}
.ca{color:#f59e0b;font-family:monospace;}
.cb{color:#38bdf8;font-family:monospace;}
.cp{color:#a78bfa;font-family:monospace;}
.cr{color:#ef4444;font-family:monospace;}
.cm{font-family:monospace;}
.cR{text-align:right;}
.cC{text-align:center;}
/* badges */
.bdg{border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;}
.bg{background:#27c27a20;color:#27c27a;border:1px solid #27c27a44;}
.bo{background:#1F306044;color:#B2B5B7;border:1px solid #2a3f7a;}
.ba{background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b44;}
.br{background:#ef444420;color:#ef4444;border:1px solid #ef444444;}
.bb{background:#38bdf820;color:#38bdf8;border:1px solid #38bdf844;}
/* buttons */
.btn{background:none;border:1px solid #1F3060;color:#d4dff0;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn:hover{border-color:#B2B5B7;color:#B2B5B7;}
.btnP{background:#1F3060;color:#ffffff;border:1px solid #2a4080;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.btnP:hover{background:#2a4080;}
.btnS{padding:3px 9px;font-size:11px;}
.btnD{color:#5a3030;border-color:#2a1010;}
.btnD:hover{color:#ef4444;border-color:#ef4444;}
/* layout */
.tb{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.tbr{margin-left:auto;display:flex;gap:8px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
/* info box */
.ibox{padding:7px 12px;background:#0d1530;border:1px solid #1F3060;border-radius:6px;font-size:11px;color:#3a5070;margin-bottom:12px;}
.ibox b{color:#B2B5B7;}
.ibox .a{color:#f59e0b;}
/* misc */
.mut{color:#253545;font-size:10px;}
.m{color:#253545;font-size:10px;margin-left:3px;}
/* KPI cards */
.kpi{background:#0d1530;border:1px solid #1F3060;border-radius:8px;padding:14px 16px;flex:1;min-width:120px;}
.kpi.ok{border-color:#27c27a44;}
.kpi.warn{border-color:#f59e0b44;}
.kpi.bad{border-color:#ef444444;}
.kl{color:#3a5070;font-size:10px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.kv{font-size:20px;font-family:monospace;font-weight:700;line-height:1.1;color:#B2B5B7;}
.kv.g{color:#27c27a;} .kv.a{color:#f59e0b;} .kv.b{color:#38bdf8;} .kv.r{color:#ef4444;} .kv.p{color:#a78bfa;}
.ks{color:#253545;font-size:10px;margin-top:3px;}
/* month headers */
.mh{color:#B2B5B7;text-align:center;}
/* rows */
.row4{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
tfoot td{border-top:1px solid #1F3060;font-weight:700;}
/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#060d1a;}
::-webkit-scrollbar-thumb{background:#1F3060;border-radius:2px;}
/* file input */
input[type=file]{display:none;}
.up-btn{background:#0d1530;border:1px dashed #1F3060;color:#3a5070;border-radius:6px;padding:10px 18px;font-size:12px;cursor:pointer;font-family:inherit;}
.up-btn:hover{border-color:#B2B5B7;color:#B2B5B7;}
/* fase steps */
.fase-steps{display:flex;gap:0;margin-bottom:20px;border:1px solid #1F3060;border-radius:8px;overflow:hidden;flex-wrap:wrap;}
.fstep{flex:1;padding:8px 10px;text-align:center;font-size:10px;color:#253545;border-right:1px solid #1F3060;min-width:80px;}
.fstep:last-child{border-right:none;}
.fstep.done{color:#27c27a;background:#060d1a;}
.fstep.cur{color:#B2B5B7;background:#1F306044;font-weight:700;}
</style>
</head>

// ═══════════════════════════════════════════════════════════════════
//  CÁLCULOS
// ═══════════════════════════════════════════════════════════════════
function calcHL(of) {
  const d = S.premissas.disp[of]; if(!d) return {ef:0,liq:0};
  const ef = Math.max(0, d.hBrutas - d.almoco - d.cafe - d.abrOS);
  const fA = (d.abs/100) + (d.ferias/100/12) + (d.trein / Math.max(1, 252*ef));
  const liq = ef * (1-Math.min(fA,.99)) * (d.prod/100);
  return {ef:r2(ef), liq:r2(liq)};
}
function calcCusto(p) {
  const dm = S.premissas.diasUteis.reduce((a,b)=>a+b,0)/12;
  const {liq} = calcHL(p.oficina);
  const cm = p.sal * (1 + p.enc/100);
  const hm = dm * liq;
  return {cm:r2(cm), ch:r2(hm>0?cm/hm:0)};
}
function calcProxPrev(a) {
  const rest = a.itv - (a.uso % a.itv);
  const meses = a.usoMed>0 ? rest/a.usoMed : 99;
  return {rest, meses:r1(meses)};
}

const r2 = n => Math.round((n||0)*100)/100;
const r1 = n => Math.round((n||0)*10)/10;
const fN = n => Math.round(n||0).toLocaleString('pt-BR');
const fR = n => 'R$ '+r2(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fH = n => r2(n||0).toFixed(2)+' HH';
const pct= n => r1(n||0).toFixed(1)+'%';
const sel= (opts,cur,fn) => `<select onchange="${fn}">${opts.map(o=>`<option${o===cur?' selected':''}>${o}</option>`).join('')}</select>`;
const inp= (v,w,cls,fn,step,min) => `<input type="number" value="${v}" style="width:${w||65}px${cls?';color:'+cls:''}" onchange="${fn}" step="${step||1}" min="${min||0}">`;
const inpT=(v,w,fn)=>`<input type="text" value="${escH(v)}" style="width:${w||130}px" onchange="${fn}">`;
function escH(s){return (s||'').toString().replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function go(tab){
  S.tab=tab;
  ['prem','frot','pess','chk','cron','agen','pprev','pcorr','disp','rec','ins','sav','sum'].forEach(t=>{
    const e=document.getElementById('t-'+t); if(e)e.classList.toggle('on',t===tab);
  });
  render();
}
function render(){
  const m=document.getElementById('main');
  if(S.tab==='prem')       rPrem(m);
  else if(S.tab==='frot')  rFrot(m);
  else if(S.tab==='pess')  rPess(m);
  else if(S.tab==='chk')   rChk(m);
  else if(S.tab==='cron')  rCron(m);
  else if(S.tab==='agen')  rAgenda(m);
  else if(S.tab==='pprev') rPPrev(m);
  else if(S.tab==='pcorr') rPCorr(m);
  else if(S.tab==='disp')  rDisp(m);
  else if(S.tab==='rec')   rRec(m);
  else if(S.tab==='ins')   rIns(m);
  else if(S.tab==='sav')   rSav(m);
  else if(S.tab==='sum')   rSum(m);
  save();
}

function rPrem(m) {
  const ofHdrs = OFICINAS.map(o=>`<th class="of-hdr">${o}</th>`).join('');

  // --- Bloco 1: Índices
  const idx_fields = [
    ['% Manutenções Preventivas','%','prev','#22c55e','5'],
    ['% Corretivas Esperadas','%','corr','#f59e0b','5'],
    ['Fator Deflator Corretivas (redução a.a.)','% a.a.','deflator','#38bdf8','0.5'],
    ['% Serviços por Terceiros','%','terceiros','#a78bfa','5'],
  ];
  const b1rows = idx_fields.map(([lbl,um,k,clr,step])=>{
    const cells = OFICINAS.map(of=>{
      const v = S.premissas.indices[of]?.[k]??0;
      return `<td>${inp(v,62,clr,`upIdx('${of}','${k}',this.value)`,step,0)}</td>`;
    }).join('');
    return `<tr><td class="lbl">${lbl}</td><td class="um">${um}</td>${cells}</tr>`;
  }).join('');

  // --- Bloco 2: Disponibilidade
  const disp_fields = [
    ['Horas brutas / dia','HH','hBrutas',null,'0.1'],
    ['Desconto almoço','HH','almoco',null,'0.05'],
    ['Desconto café','HH','cafe',null,'0.05'],
    ['HORAS EFETIVAS / DIA','HH',null,'ef'],
    ['Produtividade','%','prod',null,'1'],
    ['Absenteísmo','%','abs',null,'1'],
    ['Férias (ao ano)','%','ferias',null,'0.5'],
    ['Treinamentos e DDS','h/ano','trein',null,'1'],
    ['Abertura / Fechamento de OS','HH/dia','abrOS',null,'0.05'],
    ['HORAS LÍQUIDAS / DIA','HH',null,'liq'],
    ['HORAS LÍQUIDAS / MÊS MÉDIO','HH',null,'liqMes'],
  ];
  const b2rows = disp_fields.map(([lbl,um,k,calc,step])=>{
    if(calc!==null){
      const cells = OFICINAS.map(of=>{
        const {ef,liq}=calcHL(of);
        const dm=S.premissas.diasUteis.reduce((a,b)=>a+b,0)/12;
        const v = calc==='ef'?ef:calc==='liq'?liq:r2(liq*dm);
        return `<td class="cv">${v.toFixed(2)}</td>`;
      }).join('');
      return `<tr class="tr-c"><td class="lbl" style="color:#22c55e;font-weight:700">${lbl}</td><td class="um">${um}</td>${cells}</tr>`;
    }
    const cells = OFICINAS.map(of=>{
      const v=S.premissas.disp[of]?.[k]??0;
      return `<td>${inp(v,62,null,`upDisp('${of}','${k}',this.value)`,step||1,0)}</td>`;
    }).join('');
    return `<tr><td class="lbl">${lbl}</td><td class="um">${um}</td>${cells}</tr>`;
  }).join('');

  // --- Bloco 3: Calendário
  const mHdrs = MESES.map(mes=>`<th class="mh">${mes}</th>`).join('');
  const diasR = S.premissas.diasUteis.map((d,i)=>
    `<td>${inp(d,46,null,`S.premissas.diasUteis[${i}]=parseInt(this.value)||0;render()`,1,0)}</td>`).join('');
  const safrR = S.premissas.safra.map((s,i)=>
    `<td class="cC"><button onclick="S.premissas.safra[${i}]=!S.premissas.safra[${i}];render()" class="bdg ${s?'bg':'br'}">${s?'SAFRA':'—'}</button></td>`).join('');
  const sazR = S.premissas.sazonal.map((v,i)=>{
    const clr = v>1.0?'#f59e0b':v<1.0?'#22c55e':'#d4e8d4';
    return `<td>${inp(v,50,clr,`S.premissas.sazonal[${i}]=parseFloat(this.value)||1;render()`,'0.1',0)}</td>`;
  }).join('');

  // --- Bloco 4: Gatilhos
  const gatRows = CLASSES.map(cls=>{
    const g = S.premissas.gatilhos[cls]||{tipo:'Horas',itvs:[]};
    const unit = g.tipo==='KM'?'km':'h';
    const itvCols = [0,1,2].map(i=>{
      const iv = g.itvs[i]||{v:0,t:''};
      return `
        <td>${inp(iv.v||'',80,null,`upGat('${cls}',${i},'v',this.value)`,g.tipo==='KM'?1000:50,0)}<span class="m">${unit}</span></td>
        <td>${sel(['',...TIPOS_P],iv.t,`upGat('${cls}',${i},'t',this.value)`)}</td>`;
    }).join('');
    return `<tr>
      <td class="lbl">${cls}</td>
      <td>${sel(['Horas de Uso','KM'],g.tipo==='KM'?'KM':'Horas de Uso',`upGatTipo('${cls}',this.value)`)}</td>
      ${itvCols}
    </tr>`;
  }).join('');

  // ── Bloco 5: Calendário agrícola ────────────────────────────────────
  const p=S.premissas;
  const b5=`
    <div class="block">
      <div class="blk-t">5 · Calendário Agrícola — Safra e Entressafra</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Parâmetro</th><th>Data</th><th>Observação</th></tr></thead>
        <tbody>
          <tr>
            <td class="lbl">Data de início da safra</td>
            <td><input type="date" value="${p.inicioSafra||'2025-04-01'}" onchange="S.premissas.inicioSafra=this.value;render()" style="background:#0d1530;border:1px solid #1F3060;color:#d4dff0;border-radius:4px;padding:5px 9px;font-size:13px;outline:none"></td>
            <td class="mut">Determina qual semana é semana 1 do calendário agrícola</td>
          </tr>
          <tr>
            <td class="lbl">Data de fim da safra</td>
            <td><input type="date" value="${p.fimSafra||'2025-11-30'}" onchange="S.premissas.fimSafra=this.value;render()" style="background:#0d1530;border:1px solid #1F3060;color:#d4dff0;border-radius:4px;padding:5px 9px;font-size:13px;outline:none"></td>
            <td class="mut">Semanas fora deste período = entressafra (uso médio menor)</td>
          </tr>
        </tbody>
      </table></div>
    </div>`;

  // ── Bloco 6: Herança de tipos ────────────────────────────────────────
  const heranca=p.heranca||{S:['S'],A:['S','A'],B:['S','A','B'],C:['S','A','B','C'],D:['S','A','B','C','D']};
  const b6tipos=TIPOS_P.map(t=>{
    const lista=(heranca[t]||[t]).join(' + ');
    const cor=TPC[t]||'#B2B5B7';
    const bg=TPB[t]||'#B2B5B720';
    return`<tr>
      <td><span class="bdg" style="background:${bg};color:${cor};border:1px solid ${cor}44">${t}</span></td>
      <td class="cm">${lista}</td>
      <td><span style="color:#3a5070;font-size:11px">Executa ${(heranca[t]||[t]).length} checklist(s) físico(s)</span></td>
    </tr>`;
  }).join('');
  const b6=`
    <div class="block">
      <div class="blk-t">6 · Herança de Tipos de Preventiva (Cumulativo)</div>
      <div class="ibox">Quando o Cronograma aciona uma revisão do tipo <b>B</b>, o mecânico executa fisicamente 3 checklists: S + A + B. As HH, insumos e peças são somados automaticamente.</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Tipo acionado</th><th>Checklists executados</th><th>Observação</th></tr></thead>
        <tbody>${b6tipos}</tbody>
      </table></div>
    </div>`;

  m.innerHTML = `
    <div class="stitle">Premissas do Plano de Manutenção</div>
    <div class="sdesc">Ponto de partida de todos os cálculos. Altere qualquer valor — os resultados são recalculados em tempo real.</div>

    <div class="block">
      <div class="blk-t">1 · Índices de Manutenção — por Tipo de Oficina</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th style="min-width:250px">Premissa</th><th>U/M</th>${ofHdrs}</tr></thead>
        <tbody>${b1rows}</tbody>
      </table></div>
    </div>

    <div class="block">
      <div class="blk-t">2 · Disponibilidade de Mão de Obra — por Tipo de Oficina</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th style="min-width:250px">Premissa</th><th>U/M</th>${ofHdrs}</tr></thead>
        <tbody>${b2rows}</tbody>
      </table></div>
    </div>

    <div class="block">
      <div class="blk-t">3 · Calendário — Dias Úteis e Sazonalidade de Corretivas</div>
      <div class="ibox">Fator sazonalidade: <b>1.0</b> = normal · <b class="a">&gt;1.0 = pico (safra)</b> · verde = abaixo do normal (entressafra)</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th style="min-width:200px">Parâmetro</th>${mHdrs}</tr></thead>
        <tbody>
          <tr><td class="lbl">Dias úteis no mês</td>${diasR}</tr>
          <tr><td class="lbl">Período de safra</td>${safrR}</tr>
          <tr><td class="lbl">Fator sazonalidade corretiva</td>${sazR}</tr>
        </tbody>
      </table></div>
    </div>

    <div class="block">
      <div class="blk-t">4 · Gatilhos e Intervalos de Preventiva — por Classe de Ativo</div>
      <div class="ibox">Define quando cada equipamento entra para preventiva. Tipos: <b>S</b> = simples · <b>A</b> = intermediária · <b>B</b> = completa · <b>C/D</b> = grande porte</div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Classe de Ativo</th><th>Tipo de Gatilho</th>
          <th>Preventiva 1</th><th>Tipo</th>
          <th>Preventiva 2</th><th>Tipo</th>
          <th>Preventiva 3</th><th>Tipo</th>
        </tr></thead>
        <tbody>${gatRows}</tbody>
      </table></div>
    </div>`;
}

function upIdx(of,k,v){if(!S.premissas.indices[of])S.premissas.indices[of]={};S.premissas.indices[of][k]=parseFloat(v)||0;render();}
function upDisp(of,k,v){if(!S.premissas.disp[of])S.premissas.disp[of]={};S.premissas.disp[of][k]=parseFloat(v)||0;render();}
function upGat(cls,i,f,v){
  if(!S.premissas.gatilhos[cls])S.premissas.gatilhos[cls]={tipo:'Horas',itvs:[]};
  while(S.premissas.gatilhos[cls].itvs.length<=i)S.premissas.gatilhos[cls].itvs.push({v:0,t:''});
  S.premissas.gatilhos[cls].itvs[i][f]=f==='v'?(parseFloat(v)||0):v;
}
function upGatTipo(cls,v){
  if(!S.premissas.gatilhos[cls])S.premissas.gatilhos[cls]={tipo:'Horas',itvs:[]};
  S.premissas.gatilhos[cls].tipo=v==='KM'?'KM':'Horas';render();
}

function rFrot(m) {
  const ativo = S.frota.filter(a=>a.status==='Ativo').length;
  const kpis = CLASSES.map(c=>{
    const n=S.frota.filter(a=>a.classe===c&&a.status==='Ativo').length;
    return `<div class="kpi"><div class="kl">${c}</div><div class="kv" style="font-size:16px">${n}</div><div class="ks">ativos</div></div>`;
  }).join('');

  // Alertas: próxima prev vencendo
  const alertas = S.frota.filter(a=>a.status==='Ativo').map(a=>{
    const {meses}=calcProxPrev(a);
    return meses<=1?`<span class="bdg br" style="margin-right:4px">${a.nome}: ⚠ ${meses<=0?'VENCIDA':'&lt;1 mês'}</span>`:null;
  }).filter(Boolean).join('');

  const rows = S.frota.map(a=>{
    const {rest,meses}=calcProxPrev(a);
    const unit=a.tGat==='KM'?'km':'h';
    const scl=meses<=0?'cr':meses<=1?'ca':meses<=3?'cb':'cv';
    const slbl=meses<=0?'⚠ VENCIDA':meses<1?`< 1 mês`:`${meses} meses`;
    const stBdg=a.status==='Ativo'?'bg':a.status==='Reforma'?'ba':'br';
    const garBdg=a.gar?`<span class="bdg bb" style="margin-left:4px">Garantia</span>`:'';
    return `<tr style="opacity:${a.status==='Ativo'?1:0.4}">
      <td class="cm">${a.id}</td>
      <td>${inpT(a.nome,170,`upFr(${a.id},'nome',this.value)`)}</td>
      <td>${sel(CLASSES,a.classe,`upFrS(${a.id},'classe',this.value)`)}</td>
      <td>${inpT(a.modelo,120,`upFr(${a.id},'modelo',this.value)`)}</td>
      <td>${inp(a.ano,58,null,`upFrN(${a.id},'ano',this.value)`,1,1990)}</td>
      <td><span class="bdg ${stBdg}">${a.status}</span>${garBdg}</td>
      <td>${sel(['Horas de Uso','KM'],a.tGat==='KM'?'KM':'Horas de Uso',`upFrS(${a.id},'tGat',this.value==='KM'?'KM':'Horas')`)}</td>
      <td>${inp(a.uso,90,'#a78bfa',`upFrN(${a.id},'uso',this.value)`,a.tGat==='KM'?1000:10,0)}<span class="m">${unit}</span></td>
      <td>${inp(a.usoMed,72,null,`upFrN(${a.id},'usoMed',this.value)`,a.tGat==='KM'?100:5,0)}<span class="m">${unit}/mês</span></td>
      <td>${inp(a.itv,78,'#38bdf8',`upFrN(${a.id},'itv',this.value)`,a.tGat==='KM'?1000:50,1)}<span class="m">${unit}</span></td>
      <td class="${scl}" style="white-space:nowrap;font-weight:700">${slbl}<br><span class="mut">${fN(rest)} ${unit} restantes</span></td>
      <td class="cC"><input type="checkbox" ${a.gar?'checked':''} onchange="upFrN(${a.id},'gar',this.checked)" style="accent-color:#22c55e"></td>
      <td>
        <select class="btnS" onchange="upFrS(${a.id},'status',this.value)">
          ${STATUS_A.map(s=>`<option${s===a.status?' selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td><button class="btn btnS btnD" onclick="delFr(${a.id})">✕</button></td>
    </tr>`;
  }).join('');

  m.innerHTML = `
    <div class="stitle">Registro de Frota</div>
    <div class="sdesc">Cadastro central de ativos. A coluna <b style="color:#22c55e">Próxima Preventiva</b> é calculada automaticamente com base no uso atual e médio mensal.</div>
    ${alertas?`<div class="ibox" style="border-color:#f59e0b44"><b class="a">⚠ Atenção:</b> ${alertas}</div>`:''}
    <div class="row4" style="margin-bottom:16px">
      <div class="kpi"><div class="kl">Total de ativos</div><div class="kv">${S.frota.length}</div><div class="ks">${ativo} ativos</div></div>
      ${kpis}
    </div>
    <div class="tb">
      <button class="btnP" onclick="addFr()">+ Adicionar Ativo</button>
      <label class="up-btn" for="csv-up-fr">⬆ Importar CSV</label>
      <input type="file" id="csv-up-fr" accept=".csv" onchange="importFrota(this)">
      <div class="tbr">
        <button class="btn" onclick="dlTemplateFrota()">⬇ Template CSV</button>
        <button class="btn" onclick="expCSV('frota')">⬇ Exportar CSV</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>ID</th><th>Nome / Descrição</th><th>Classe</th><th>Modelo</th><th>Ano</th>
          <th>Status</th><th>Gatilho</th><th>Uso Atual</th>
          <th style="color:#38bdf8">Uso/sem Safra</th><th style="color:#4a6d8c">Uso/sem Entress.</th>
          <th>Intervalo Prev.</th><th>Próxima Preventiva ▼</th><th>Gar.</th><th>Situação</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="mut" style="margin-top:8px">🔴 Vencida · 🟡 &lt;1 mês · 🔵 &lt;3 meses · 🟢 Em dia</div>`;
}

function upFr(id,k,v){S.frota=S.frota.map(a=>a.id===id?{...a,[k]:v}:a);render();}

function rPess(m) {
  const ativos=S.pessoas.filter(p=>p.status==='Ativo');
  const totCM=ativos.reduce((s,p)=>s+calcCusto(p).cm,0);

  const rows=S.pessoas.map(p=>{
    const {cm,ch}=calcCusto(p);
    const stBdg=p.status==='Ativo'?'bg':'br';
    return `<tr style="opacity:${p.status==='Ativo'?1:0.4}">
      <td class="cm">${p.id}</td>
      <td>${inpT(p.nome,175,`upPs(${p.id},'nome',this.value)`)}</td>
      <td>${inpT(p.cargo,145,`upPs(${p.id},'cargo',this.value)`)}</td>
      <td>${sel(OFICINAS,p.oficina,`upPsS(${p.id},'oficina',this.value)`)}</td>
      <td>${sel(TURNOS,p.turno,`upPsS(${p.id},'turno',this.value)`)}</td>
      <td>${inp(p.sal,90,null,`upPsN(${p.id},'sal',this.value)`,100,0)}</td>
      <td>${inp(p.enc,55,'#4a7a4a',`upPsN(${p.id},'enc',this.value)`,1,0)}<span class="m">%</span></td>
      <td class="cv cR">${fR(cm)}</td>
      <td class="ca cR">${fR(ch)}<span class="m">/HH</span></td>
      <td><span class="bdg ${stBdg}">${p.status}</span></td>
      <td>
        <button class="btn btnS" onclick="togPsS(${p.id})">${p.status==='Ativo'?'Inativar':'Ativar'}</button>
        <button class="btn btnS btnD" onclick="delPs(${p.id})">✕</button>
      </td>
    </tr>`;
  }).join('');

  // Resumo por oficina
  const resOf=OFICINAS.map(of=>{
    const ps=S.pessoas.filter(p=>p.oficina===of&&p.status==='Ativo');
    const cm=ps.reduce((s,p)=>s+calcCusto(p).cm,0);
    const {liq}=calcHL(of);
    const dm=S.premissas.diasUteis.reduce((a,b)=>a+b,0)/12;
    const hTot=ps.length*dm*liq;
    return ps.length?`<tr>
      <td>${of}</td>
      <td class="cv cR">${ps.length}</td>
      <td class="ca cR">${fR(cm)}</td>
      <td class="cb cR">${r1(hTot).toFixed(1)}</td>
    </tr>`:'';
  }).join('');

  // Custo por oficina cards
  const ofCards=OFICINAS.map(of=>{
    const ps=S.pessoas.filter(p=>p.oficina===of&&p.status==='Ativo');
    if(!ps.length)return '';
    const {liq}=calcHL(of);
    return `<div class="kpi" style="min-width:150px">
      <div class="kl">${of}</div>
      <div class="kv" style="font-size:16px;color:#38bdf8">${ps.length}</div>
      <div class="ks">${liq.toFixed(2)} HH líq/dia</div>
    </div>`;
  }).join('');

  m.innerHTML = `
    <div class="stitle">Pessoas & Mão de Obra</div>
    <div class="sdesc">Banco de dados centralizado. O <b style="color:#22c55e">Custo/HH</b> é calculado automaticamente usando as Horas Líquidas das Premissas de cada oficina.</div>
    <div class="row4" style="margin-bottom:16px">
      <div class="kpi"><div class="kl">Equipe ativa</div><div class="kv">${ativos.length}</div><div class="ks">pessoas</div></div>
      <div class="kpi"><div class="kl">Custo MO/mês</div><div class="kv a">${fR(totCM)}</div><div class="ks">total com encargos</div></div>
      <div class="kpi"><div class="kl">Custo MO/ano</div><div class="kv a">${fR(totCM*12)}</div><div class="ks">projeção anual</div></div>
      ${ofCards}
    </div>
    <div class="tb">
      <button class="btnP" onclick="addPs()">+ Adicionar Pessoa</button>
      <label class="up-btn" for="csv-up">⬆ Importar CSV</label>
      <input type="file" id="csv-up" accept=".csv" onchange="importCSV(this)">
      <div class="tbr">
        <button class="btn" onclick="dlTemplate()">⬇ Template CSV</button>
        <button class="btn" onclick="expCSV('pessoas')">⬇ Exportar CSV</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>ID</th><th>Nome</th><th>Cargo</th><th>Oficina</th><th>Turno</th>
          <th>Salário</th><th>Encargos</th><th class="r">Custo Mensal</th><th class="r">Custo/HH</th><th>Status</th><th>Ações</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr>
          <td colspan="7" style="color:#22c55e;font-size:11px">TOTAL EQUIPE ATIVA (${ativos.length} pessoas)</td>
          <td class="cv cR">${fR(totCM)}/mês</td>
          <td colspan="3"></td>
        </tr></tfoot>
      </table>
    </div>
    <div style="margin-top:22px">
      <div class="blk-t">Resumo por Tipo de Oficina</div>
      <div class="tbl-wrap" style="max-width:500px"><table>
        <thead><tr><th>Oficina</th><th class="r">Pessoas</th><th class="r">Custo/mês</th><th class="r">HH disponível/mês</th></tr></thead>
        <tbody>${resOf}</tbody>
        <tfoot><tr>
          <td style="color:#22c55e">TOTAL</td>
          <td class="cv cR">${ativos.length}</td>
          <td class="ca cR">${fR(totCM)}</td>
          <td class="cb cR">—</td>
        </tr></tfoot>
      </table></div>
    </div>`;
}

// Constantes de cor por tipo de preventiva
const TPC = {S:'#22c55e',A:'#f59e0b',B:'#ef4444',C:'#a78bfa',D:'#fb7185'};
const TPB = {S:'#22c55e20',A:'#f59e0b20',B:'#ef444420',C:'#a78bfa20',D:'#fb718520'};
const mHdrs12 = ()=>MESES.map(mes=>`<th class="mh" style="min-width:66px">${mes}</th>`).join('');

// Determina o tipo de preventiva dado o uso acumulado e os gatilhos
function detTipo(cumUso, g) {
  const itvs=(g.itvs||[]).filter(iv=>iv.v>0&&iv.t).sort((a,b)=>a.v-b.v);
  if(!itvs.length) return 'S';
  let tipo=itvs[0].t;
  itvs.forEach(iv=>{ if(Math.round(cumUso)%Math.round(iv.v)===0) tipo=iv.t; });
  return tipo;
}

// ── HERANÇA DE TIPOS ─────────────────────────────────────────────────
// Retorna array de tipos que devem ser executados para um dado tipo acionado
function getHeranca(tipo){
  const h=S.premissas.heranca||{S:['S'],A:['S','A'],B:['S','A','B'],C:['S','A','B','C'],D:['S','A','B','C','D']};
  return h[tipo]||[tipo];
}

// HH cumulativa: soma todos os checklists da herança
function calcHHChk(classe,tipoPrev){
  const tipos=getHeranca(tipoPrev);
  return r2(tipos.reduce((tot,t)=>
    tot+S.checklist.filter(c=>c.classe===classe&&c.tipoPrev===t).reduce((s,c)=>s+(c.hh||0),0)
  ,0));
}

// HH por oficina cumulativa (para calcPlanPrev)
function getChkItens(classe,tipoPrev){
  // Retorna todos os itens do checklist da herança acumulada
  const tipos=getHeranca(tipoPrev);
  return tipos.flatMap(t=>S.checklist.filter(c=>c.classe===classe&&c.tipoPrev===t));
}

// ── CALENDÁRIO AGRÍCOLA — SEMANAS ────────────────────────────────────
function parseDateStr(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }

function gerarSemanas(){
  const inicio = parseDateStr(S.premissas.inicioSafra||'2025-04-01');
  const fimSafra = parseDateStr(S.premissas.fimSafra||'2025-11-30');
  const semanas=[];
  let d=new Date(inicio);
  for(let i=0;i<52;i++){
    const fim=new Date(d); fim.setDate(fim.getDate()+6);
    const safra = d>=inicio && d<=fimSafra;
    const label=`S${String(i+1).padStart(2,'0')} ${d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}`;
    const mes=d.getMonth(); // 0-11 para agregar no Plan.
    semanas.push({idx:i,label,data:new Date(d),fim,safra,mes});
    d.setDate(d.getDate()+7);
  }
  return semanas;
}

// ── CRONOGRAMA SEMANAL (evolução 2) ──────────────────────────────────
function calcCronogramaSemanal(){
  const semanas=gerarSemanas();
  const grid={};
  S.frota.filter(a=>a.status==='Ativo').forEach(a=>{
    grid[a.id]={};
    if(!a.itv) return;
    const g=S.premissas.gatilhos[a.classe]; if(!g) return;
    let usoAcum=a.uso;
    semanas.forEach((sem,wi)=>{
      const usoSem=sem.safra?(a.usoMedSafra||0):(a.usoMedEnt||0);
      if(!usoSem){usoAcum+=0;return;}
      const nI=Math.floor(usoAcum/a.itv);
      const nF=Math.floor((usoAcum+usoSem)/a.itv);
      if(nF>nI){
        const prevs=[];
        for(let n=nI+1;n<=nF;n++){
          const cu=n*a.itv;
          const tipo=detTipo(cu,g);
          const hh=calcHHChk(a.classe,tipo); // agora cumulativo com herança
          prevs.push({tipo,hh,cu});
        }
        const ord=['S','A','B','C','D'];
        prevs.sort((x,y)=>ord.indexOf(y.tipo)-ord.indexOf(x.tipo));
        grid[a.id][wi]={
          tipo:prevs[0]?.tipo||'S',
          hh:r2(prevs.reduce((s,p)=>s+p.hh,0)),
          count:prevs.length, prevs, safra:sem.safra,
          label:sem.label, mes:sem.mes
        };
      }
      usoAcum=r2(usoAcum+usoSem);
    });
  });
  return {grid, semanas};
}

// Compatibilidade: calcCronograma mensal deriva do semanal
function calcCronograma(){
  const {grid:sg,semanas}=calcCronogramaSemanal();
  const grid={};
  S.frota.filter(a=>a.status==='Ativo').forEach(a=>{
    grid[a.id]={};
    const ag=sg[a.id]||{};
    // Agrupar semanas por mês (mês 0-11 relativo ao início da safra → mapear para Jan=0)
    Object.values(ag).forEach(entry=>{
      const m=entry.mes; // mes real (0=jan)
      if(!grid[a.id][m]){
        grid[a.id][m]={tipo:entry.tipo,hh:entry.hh,count:entry.count,prevs:entry.prevs};
      } else {
        // Acumular se mais de uma preventiva no mesmo mês
        grid[a.id][m].hh=r2(grid[a.id][m].hh+entry.hh);
        grid[a.id][m].count+=entry.count;
        grid[a.id][m].prevs=[...grid[a.id][m].prevs,...entry.prevs];
        // Recalcular tipo mais alto
        const ord=['S','A','B','C','D'];
        grid[a.id][m].prevs.sort((x,y)=>ord.indexOf(y.tipo)-ord.indexOf(x.tipo));
        grid[a.id][m].tipo=grid[a.id][m].prevs[0]?.tipo||'S';
      }
    });
  });
  return grid;
}

// HH preventiva por oficina por mês — usa herança acumulada
function calcPlanPrev(cron){
  const res={}; OFICINAS.forEach(of=>res[of]=new Array(12).fill(0));
  S.frota.filter(a=>a.status==='Ativo').forEach(a=>{
    const ac=cron[a.id]||{};
    Object.entries(ac).forEach(([m,entry])=>{
      const mi=parseInt(m);
      entry.prevs.forEach(p=>{
        // Usa herança: pega todos os itens dos tipos acumulados
        getChkItens(a.classe,p.tipo).forEach(c=>{
          if(res[c.oficina]) res[c.oficina][mi]=r2(res[c.oficina][mi]+(c.hh||0));
        });
      });
    });
  });
  return res;
}


// HH corretiva esperada por oficina por mês (com deflator e sazonalidade)
function calcPlanCorr(planPrev){
  const res={}; OFICINAS.forEach(of=>res[of]=new Array(12).fill(0));
  OFICINAS.forEach(of=>{
    const idx=S.premissas.indices[of]||{};
    const prev=Math.max(0.01,idx.prev||50);
    const corr=idx.corr||50;
    const defl=idx.deflator||0;
    const ratio=corr/prev;
    for(let m=0;m<12;m++){
      const base=planPrev[of][m]*ratio;
      // deflator aplicado progressivamente ao longo do ano (0 no início, defl% ao final)
      const deflFator=1-(defl/100)*(m/11+0.5)*0.5;
      const saz=S.premissas.sazonal[m]||1.0;
      res[of][m]=r2(Math.max(0,base*deflFator*saz));
    }
  });
  return res;
}

// HH disponível por oficina por mês (pessoas × dias úteis × horas líquidas)
function calcDispMes(){
  const res={}; OFICINAS.forEach(of=>res[of]=new Array(12).fill(0));
  OFICINAS.forEach(of=>{
    const n=S.pessoas.filter(p=>p.oficina===of&&p.status==='Ativo').length;
    const {liq}=calcHL(of);
    for(let m=0;m<12;m++) res[of][m]=r2(n*S.premissas.diasUteis[m]*liq);
  });
  return res;
}

let agendaQ=null;                       // trimestre selecionado (0..3)
function setAgQ(n){agendaQ=n;render();}
function fmtKey(d){return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}
function shortAtivo(nome){
  const p=String(nome).split('—'); return p.length>1?p.pop().trim():nome.split(' ').slice(-1)[0];
}
function weekdaysOf(weekStart){
  const ds=[];
  for(let i=0;i<7;i++){const d=new Date(weekStart);d.setDate(d.getDate()+i);const dw=d.getDay();if(dw>=1&&dw<=5)ds.push(d);}
  return ds.length?ds:[new Date(weekStart)];
}
// Gera os eventos da agenda a partir do cronograma semanal,
// atribuindo data (dia útil), oficina principal e mecânico responsável.
function buildAgendaEventos(){
  const {grid:sg,semanas}=calcCronogramaSemanal();
  const eventos=[];
  const rr={}; OFICINAS.forEach(o=>rr[o]=0);   // round-robin de mecânicos por oficina
  const wkCnt={};                               // contador de eventos por semana (espalhar nos dias)
  S.frota.filter(a=>a.status==='Ativo').forEach(a=>{
    const ag=sg[a.id]||{};
    Object.keys(ag).map(Number).sort((x,y)=>x-y).forEach(wi=>{
      const e=ag[wi], sem=semanas[wi]; if(!sem) return;
      // Oficina principal = maior HH na herança do tipo acionado
      const itens=getChkItens(a.classe,e.tipo);
      const byOf={}; itens.forEach(c=>{byOf[c.oficina]=(byOf[c.oficina]||0)+(c.hh||0);});
      const oficina=Object.entries(byOf).sort((x,y)=>y[1]-x[1])[0]?.[0]||'Mec. Oficina';
      // Mecânico responsável (round-robin na oficina)
      const time=S.pessoas.filter(p=>p.oficina===oficina&&p.status==='Ativo');
      let mec='Equipe '+oficina;
      if(time.length){ mec=time[rr[oficina]%time.length].nome; rr[oficina]++; }
      // Data: distribui nos dias úteis da semana
      const dias=weekdaysOf(sem.data);
      const k=(wkCnt[wi]=(wkCnt[wi]||0)); wkCnt[wi]++;
      const date=dias[k%dias.length];
      eventos.push({date:new Date(date),ativo:a.nome,short:shortAtivo(a.nome),classe:a.classe,
        tipo:e.tipo,hh:e.hh,count:e.count,prevs:e.prevs,oficina,mec,wi,safra:sem.safra});
    });
  });
  eventos.sort((x,y)=>x.date-y.date);
  return {eventos,semanas};
}

const DOW=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  if(!eventos.length){ m.innerHTML='<div class="stitle">Agenda de Preventivas</div><div class="sdesc">Nenhuma preventiva programada no horizonte. Verifique premissas/frota.</div>'; return; }

  // Trimestre padrão = o mais carregado
  if(agendaQ===null){
    const cnt=[0,0,0,0]; eventos.forEach(e=>{cnt[Math.min(3,Math.floor(e.wi/13))]+=e.count;});
    agendaQ=cnt.indexOf(Math.max(...cnt));
  }
  const q=agendaQ, wS=q*13, wE=Math.min(51,q*13+12);
  const dStart=semanas[wS].data, dEnd=semanas[wE].fim;
  const mFirst=new Date(dStart.getFullYear(),dStart.getMonth(),1);
  const mLast =new Date(dEnd.getFullYear(),dEnd.getMonth(),1);

  // Eventos do trimestre (pelos meses exibidos)
  const evQ=eventos.filter(e=>{
    const k=new Date(e.date.getFullYear(),e.date.getMonth(),1);

  const nPrev=evQ.reduce((s,e)=>s+e.count,0);

    const on=qi===q;
    return`<button onclick="setAgQ(${qi})" style="background:${on?'#1F3060':'#0d1a2e'};color:${on?'#fff':'#5a7ab0'};border:1px solid ${on?'#2a3f7a':'#15233d'};padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:${on?'700':'400'}">T${qi+1} · ${lbl}</button>`;

  const calHtml=months.map(mo=>{
    const y=mo.getFullYear(),mm=mo.getMonth();

    const cells=[];
    for(let i=0;i<firstDow;i++) cells.push(null);
    for(let d=1;d<=nDays;d++) cells.push(new Date(y,mm,d));
    while(cells.length%7) cells.push(null);
    const rows=[];
    for(let i=0;i<cells.length;i+=7) rows.push(cells.slice(i,i+7));

    const head=DOW.map(d=>`<th style="padding:5px 0;font-size:10px;color:#3a5070;font-weight:600;text-align:center;border-bottom:1px solid #15233d">${d}</th>`).join('');
    const body=rows.map(row=>'<tr>'+row.map(d=>{
      if(!d) return`<td style="background:#070d18;border:1px solid #0d1626;height:78px;width:14.28%"></td>`;
      const evs=byDay[fmtKey(d)]||[];
      const isSafra=evs.some(e=>e.safra);
      const dowWk=(d.getDay()===0||d.getDay()===6);
      const bgBase=dowWk?'#0a1119':(isSafra?'#0a1830':'#08111f');
      const chips=evs.slice(0,4).map(e=>{
        const c=TPA[e.tipo]||'#B2B5B7';
        const ttl=`${e.date.toLocaleDateString('pt-BR')} · ${e.ativo} · Rev. ${e.tipo} (${TPLBL[e.tipo]}) · ${e.oficina} · ${e.mec} · ${e.hh.toFixed(1)} HH${e.count>1?' · '+e.count+' preventivas':''}`;
        return`<div title="${ttl}" style="display:flex;align-items:center;gap:3px;background:${c}1f;border-left:3px solid ${c};border-radius:3px;padding:1px 3px;margin-bottom:2px;overflow:hidden;white-space:nowrap">

          <span style="font-size:8px;color:#9fb0c8;overflow:hidden;text-overflow:ellipsis">${e.short}</span>
        </div>`;
      }).join('');
      const extra=evs.length>4?`<div style="font-size:8px;color:#5a7ab0">+${evs.length-4} mais</div>`:'';
      return`<td style="background:${bgBase};border:1px solid #0d1626;height:78px;width:14.28%;vertical-align:top;padding:2px">
        <div style="font-size:10px;color:${isSafra?'#B2B5B7':'#3a5070'};text-align:right;padding-right:2px;font-weight:${isSafra?'700':'400'}">${d.getDate()}</div>
        ${chips}${extra}
      </td>`;
    }).join('')+'</tr>').join('');

    return`<div class="block" style="flex:1;min-width:300px">
      <div class="blk-t">${mo.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).replace(/^./,c=>c.toUpperCase())}</div>
      <table style="width:100%;border-collapse:collapse;table-layout:fixed">
        <thead><tr>${head}</tr></thead><tbody>${body}</tbody>
      </table>
    </div>`;
  }).join('');

  const rowsList=evQ.map(e=>{

      <td style="padding:5px 8px;font-size:11px">${e.mec}</td>
      <td style="padding:5px 8px;text-align:right;font-family:monospace;font-size:11px;color:#f59e0b">${e.hh.toFixed(1)}</td>
    </tr>`;
  }).join('');

  const leg=Object.entries(TPA).map(([t,c])=>
    `<span style="display:inline-flex;align-items:center;gap:5px;margin-right:14px">
      <span style="width:18px;height:18px;background:${c};border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff">${t}</span>
      <span style="font-size:11px;color:#4a6d8c">${TPLBL[t]}</span></span>`).join('');

  m.innerHTML=`
    <div class="stitle">📆 Agenda de Preventivas — Calendário Mensal</div>
    <div class="sdesc">Preventivas programadas em datas reais, com oficina e mecânico responsável atribuídos automaticamente a partir do cronograma e dos checklists. Selecione o trimestre para navegar.</div>

      <div class="kpi"><div class="kl">Preventivas no trimestre</div><div class="kv p">${nPrev}</div></div>
      <div class="kpi"><div class="kl">HH preventiva total</div><div class="kv a">${hhTot.toFixed(1)}</div></div>

      <div class="kpi"><div class="kl">Dia mais carregado</div><div class="kv" style="font-size:14px">${diaTop}</div><div class="ks">${diaTopN} preventiva(s)</div></div>
    </div>

    <div class="block" style="margin-bottom:8px">

    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:stretch">${calHtml}</div>

function rPPrev(m){
  const cron=calcCronograma();
  const planPrev=calcPlanPrev(cron);
  const totMes=new Array(12).fill(0);
  OFICINAS.forEach(of=>planPrev[of].forEach((h,i)=>totMes[i]=r2(totMes[i]+h)));
  const totAnual=r2(totMes.reduce((a,b)=>a+b,0));

  const ofRows=OFICINAS.map(of=>{
    const hh=planPrev[of];
    const totOf=r2(hh.reduce((a,b)=>a+b,0)); if(!totOf) return '';
    const idx=S.premissas.indices[of]||{};
    const cells=hh.map((h,i)=>{
      if(!h) return `<td class="mut cC">—</td>`;
      const bg=S.premissas.safra[i]?'background:#0d1a0d;':'';
      return `<td class="ca cC" style="${bg}">${h.toFixed(1)}</td>`;
    }).join('');
    return `<tr>
      <td class="lbl">${of}</td>${cells}

// Versão de calcPlanCorr com opção de ignorar deflator (para baseline do Saving)
function calcPlanCorrOpt(planPrev,ignoreDefl){
  const res={}; OFICINAS.forEach(of=>res[of]=new Array(12).fill(0));
  OFICINAS.forEach(of=>{
    const idx=S.premissas.indices[of]||{};
    const prev=Math.max(0.01,idx.prev||50);
    const corr=idx.corr||50;
    const defl=ignoreDefl?0:(idx.deflator||0);
    const ratio=corr/prev;
    for(let mo=0;mo<12;mo++){
      const base=planPrev[of][mo]*ratio;
      const deflFator=1-(defl/100)*(mo/11+0.5)*0.5;
      const saz=S.premissas.sazonal[mo]||1.0;
      res[of][mo]=r2(Math.max(0,base*deflFator*saz));
    }
  });
  return res;
}
function custoHHOf(of){
  const ps=S.pessoas.filter(p=>p.oficina===of&&p.status==='Ativo');
  return ps.length?r2(ps.reduce((s,p)=>s+calcCusto(p).ch,0)/ps.length):0;
}

function rRec(m){
  const cron=calcCronograma();
  const planPrev=calcPlanPrev(cron);
  const planCorr=calcPlanCorr(planPrev);
  const avgDias=r2(S.premissas.diasUteis.reduce((a,b)=>a+b,0)/12);

  const ofBlocks=OFICINAS.map(of=>{
    const pesAtivas=S.pessoas.filter(p=>p.oficina===of&&p.status==='Ativo');
    const {liq}=calcHL(of);
    const idx=S.premissas.indices[of]||{};
    const hhNecAnual=r2(planPrev[of].reduce((a,b)=>a+b,0)+planCorr[of].reduce((a,b)=>a+b,0));
    const hhPessAnual=r2(avgDias*12*liq);
    const nNec=hhPessAnual>0?Math.ceil(hhNecAnual/hhPessAnual):0;
    const nAtual=pesAtivas.length;
    const gap=nNec-nAtual;
    const hhDispAtual=r2(nAtual*hhPessAnual);
    const util=hhDispAtual>0?r2(hhNecAnual/hhDispAtual*100):0;
    const custoAtual=r2(pesAtivas.reduce((s,p)=>s+calcCusto(p).cm,0));
    const custoMedPess=nAtual>0?r2(custoAtual/nAtual):0;
    const custoNec=r2(custoMedPess*nNec);
    const deltaCusto=r2(custoNec-custoAtual);
    if(!nAtual&&!nNec) return '';
    const gapClr=gap>0?'#ef4444':gap<0?'#27c27a':'#f59e0b';
    const utClr=util>95?'#ef4444':util>80?'#f59e0b':'#27c27a';
    return `
    <div class="block">
      <div class="blk-t">${of}<span style="font-size:12px;text-transform:none;font-weight:400;color:#8aacc8">&nbsp;&nbsp;${nAtual} pessoas ativas · ${liq.toFixed(2)} HH líq/dia/pessoa &nbsp;<span class="bdg bo">${pct(idx.prev||0)} prev</span><span class="bdg ba" style="margin-left:4px">${pct(idx.corr||0)} corr</span></span></div>

        <div class="kpi"><div class="kl">Utilização</div><div class="kv" style="color:${utClr}">${util}%</div></div>
        <div class="kpi"><div class="kl">HH Necessária/ano</div><div class="kv a">${fN(hhNecAnual)}</div></div>
        <div class="kpi"><div class="kl">HH Disponível/ano</div><div class="kv b">${fN(hhDispAtual)}</div></div>
        <div class="kpi ${deltaCusto>0?'bad':deltaCusto<0?'ok':''}"><div class="kl">Δ Custo MO/mês</div><div class="kv" style="color:${deltaCusto>0?'#ef4444':deltaCusto<0?'#27c27a':'#f59e0b'}">${deltaCusto>0?'+':''}${fR(deltaCusto)}</div></div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Pessoa</th><th>Cargo</th><th>Turno</th><th class="r">Salário</th><th class="r">Custo Mensal</th><th class="r">Custo/HH</th></tr></thead>
        <tbody>
          ${pesAtivas.map(p=>{const{cm,ch}=calcCusto(p);return`<tr><td>${p.nome}</td><td class="mut">${p.cargo}</td><td class="mut">${p.turno}</td><td class="cm cR">${fR(p.sal)}</td><td class="co cR">${fR(cm)}</td><td class="ca cR">${fR(ch)}/HH</td></tr>`;}).join('')}
          ${!pesAtivas.length?`<tr><td colspan="6" style="color:#2e4a6a;text-align:center;padding:14px">Sem pessoas cadastradas nesta oficina</td></tr>`:''}
        </tbody>
        <tfoot><tr><td colspan="3">Quadro sugerido: <b>${nNec} pessoa(s)</b></td><td></td><td class="co cR">${fR(custoAtual)}/mês atual</td><td></td></tr></tfoot>
      </table></div>
    </div>`;
  }).join('');

  let totAtual=0,totNec=0;
  OFICINAS.forEach(of=>{
    const{liq}=calcHL(of); const avgD=r2(S.premissas.diasUteis.reduce((a,b)=>a+b,0)/12);
    const hhNec=r2(planPrev[of].reduce((a,b)=>a+b,0)+planCorr[of].reduce((a,b)=>a+b,0));
    const hhP=r2(avgD*12*liq); const nNec=hhP>0?Math.ceil(hhNec/hhP):0;
    totAtual+=S.pessoas.filter(p=>p.oficina===of&&p.status==='Ativo').length; totNec+=nNec;
  });

  m.innerHTML=`<div class="stitle">Recursos Necessários — Dimensionamento de Headcount</div>
    <div class="sdesc">Calcula o número de pessoas necessárias por oficina com base na demanda de HH total (Preventiva + Corretiva) e na capacidade individual por pessoa.</div>

function rSav(m){
  const cron=calcCronograma();
  const planPrev=calcPlanPrev(cron);
  const planCorrBase=calcPlanCorrOpt(planPrev,true);
  const planCorrDefl=calcPlanCorrOpt(planPrev,false);
  let custoPrev=0,custoBase=0,custoDefl=0;
  const ofRows=OFICINAS.map(of=>{
    const chh=custoHHOf(of);
    const hPv=r2(planPrev[of].reduce((a,b)=>a+b,0));
    const hCb=r2(planCorrBase[of].reduce((a,b)=>a+b,0));
    const hCd=r2(planCorrDefl[of].reduce((a,b)=>a+b,0));
    if(!hPv&&!hCb) return '';
    const cPv=r2(hPv*chh),cCb=r2(hCb*chh),cCd=r2(hCd*chh),sav=r2(cCb-cCd);
    const pct2=cCb>0?r2(sav/cCb*100):0;
    custoPrev+=cPv; custoBase+=cCb; custoDefl+=cCd;
    return `<tr><td class="lbl">${of}</td><td class="cm cR">${fR(chh)}/HH</td><td class="cb cR">${fN(hPv)}</td><td class="ca cR">${fN(hCb)}</td><td class="cr cR">${fN(hCd)}</td><td class="co cR">${fR(cPv)}</td><td class="ca cR">${fR(cCb)}</td><td class="cr cR">${fR(cCd)}</td><td class="cv cR" style="font-weight:700">${fR(sav)}</td><td class="cv cC">${pct2}%</td></tr>`;
  }).join('');
  const savTot=r2(custoBase-custoDefl);
  const savPct=custoBase>0?r2(savTot/custoBase*100):0;

  const mSavRow=MESES.map((_,i)=>{
    let base=0,defl=0;
    OFICINAS.forEach(of=>{const chh=custoHHOf(of);base+=planCorrBase[of][i]*chh;defl+=planCorrDefl[of][i]*chh;});
    const s=r2(base-defl);
    return `<td class="cv cC" style="font-weight:700">${fR(s)}</td>`;
  }).join('');

  m.innerHTML=`<div class="stitle">Saving — Retorno Financeiro do Plano Preventivo</div>
    <div class="sdesc">Compara o custo da corretiva sem plano (baseline, deflator=0) versus a corretiva esperada com o plano de preventivas e fator deflator aplicado. O Saving é a diferença.</div>
    <div class="row4">
      <div class="kpi"><div class="kl">Custo corretiva sem plano/ano</div><div class="kv r">${fR(r2(custoBase))}</div><div class="ks">baseline (sem deflator)</div></div>
      <div class="kpi"><div class="kl">Custo corretiva com plano/ano</div><div class="kv a">${fR(r2(custoDefl))}</div><div class="ks">com deflator aplicado</div></div>
      <div class="kpi ok"><div class="kl">Saving projetado / ano</div><div class="kv g">${fR(savTot)}</div><div class="ks">redução do custo corretivo</div></div>
      <div class="kpi ok"><div class="kl">% Saving sobre corretiva</div><div class="kv g">${savPct}%</div></div>
    </div>
    <div class="block"><div class="blk-t">Saving por Tipo de Oficina</div>
      <div class="tbl-wrap"><table><thead><tr><th>Oficina</th><th class="r">Custo/HH</th><th class="r">HH Prev</th><th class="r">HH Corr Base</th><th class="r">HH Corr Plano</th><th class="r">Custo Prev</th><th class="r">Custo Corr Base</th><th class="r">Custo Corr Plano</th><th class="r" style="color:#27c27a">Saving</th><th>%</th></tr></thead>
      <tbody>${ofRows}
        <tr class="tr-c"><td class="lbl" style="color:#e8762b;font-weight:700">TOTAL</td><td></td><td class="cb cR">${fN(r2(OFICINAS.reduce((s,of)=>s+planPrev[of].reduce((a,b)=>a+b,0),0)))}</td><td class="ca cR">${fN(r2(OFICINAS.reduce((s,of)=>s+planCorrBase[of].reduce((a,b)=>a+b,0),0)))}</td><td class="cr cR">${fN(r2(OFICINAS.reduce((s,of)=>s+planCorrDefl[of].reduce((a,b)=>a+b,0),0)))}</td><td class="co cR">${fR(r2(custoPrev))}</td><td class="ca cR">${fR(r2(custoBase))}</td><td class="cr cR">${fR(r2(custoDefl))}</td><td class="cv cR" style="font-weight:700">${fR(savTot)}</td><td class="cv cC">${savPct}%</td></tr>
      </tbody></table></div>
    </div>
    <div class="block"><div class="blk-t">Saving Mensal Projetado</div>
      <div class="tbl-wrap"><table><thead><tr><th>Métrica</th>${MESES.map(me=>`<th class="mh">${me}</th>`).join('')}</tr></thead>
      <tbody><tr class="tr-c"><td class="lbl" style="color:#27c27a;font-weight:700">SAVING MENSAL</td>${mSavRow}</tr></tbody></table></div>
    </div>`;
}

function rSum(m){
  const cron=calcCronograma();

  const planCorrBase=calcPlanCorrOpt(planPrev,true);
  const disp=calcDispMes();

  const totHHDisp=r2(OFICINAS.reduce((s,of)=>s+disp[of].reduce((a,b)=>a+b,0),0));
  const totNec=r2(totHHPrev+totHHCorr);
  const saldoG=r2(totHHDisp-totNec);
  const utilG=totHHDisp>0?r2(totNec/totHHDisp*100):0;
  const nPess=S.pessoas.filter(p=>p.status==='Ativo').length;
  const custoMO=r2(S.pessoas.filter(p=>p.status==='Ativo').reduce((s,p)=>s+calcCusto(p).cm,0));
  const totPrev=ativo.reduce((s,a)=>s+Object.keys(cron[a.id]||{}).length,0);

  const ofRows=OFICINAS.map(of=>{

    </div>
    <div class="row4">

      <div class="kpi"><div class="kl">Equipe de manutenção</div><div class="kv b">${nPess}</div><div class="ks">pessoas ativas</div></div>
      <div class="kpi"><div class="kl">Custo MO mensal</div><div class="kv a">${fR(custoMO)}</div><div class="ks">${fR(r2(custoMO*12))}/ano</div></div>

      <div class="kpi"><div class="kl">HH Preventiva / ano</div><div class="kv g">${fN(totHHPrev)}</div></div>
      <div class="kpi"><div class="kl">HH Corretiva esperada</div><div class="kv a">${fN(totHHCorr)}</div></div>
      <div class="kpi ${saldoG<0?'bad':saldoG<100?'warn':'ok'}"><div class="kl">Saldo HH anual</div><div class="kv ${saldoG<0?'r':saldoG<100?'a':'g'}">${saldoG>=0?'+':''}${fN(saldoG)}</div><div class="ks">disp − necessária</div></div>

// parser CSV robusto (suporta campos com aspas e vírgulas internas)
function parseCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur.trim());cur='';}
    else{cur+=ch;}
  }
  result.push(cur.trim());
  return result;
}
function dl(csv,fname){
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=fname;a.click();
  URL.revokeObjectURL(u);
}
