name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DJANGO_SETTINGS_MODULE: config.settings.test

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"

      - name: Instalar dependencias
        run: uv sync

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: agrovector
          POSTGRES_USER: agrovector
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agrovector -d agrovector"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_DB: agrovector
      POSTGRES_USER: agrovector
      POSTGRES_PASSWORD: dev
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"

      - name: Instalar dependencias
        run: uv sync

      - name: pytest (com cobertura minima 85% em apps/motor)
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=85
