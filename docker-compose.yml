services:
  db:
    image: postgres:16
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agrovector}
      POSTGRES_USER: ${POSTGRES_USER:-agrovector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agrovector} -d ${POSTGRES_DB:-agrovector}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: python manage.py procrastinate worker
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: {}
